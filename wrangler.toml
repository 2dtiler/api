name = "2dtiler-api"
main = "src/index.ts"
compatibility_date = "2026-04-09"

# Route all requests to api.2dtiler.com through this worker.
# The zone (2dtiler.com) must be on your Cloudflare account.
route = { pattern = "api.2dtiler.com/*", zone_name = "2dtiler.com" }

[[d1_databases]]
binding = "DB"
database_name = "2dtiler"
database_id = "bd9d2b49-65a8-4684-9911-38c6095c6f0b"

[triggers]
# Run daily at 14:00 UTC
crons = ["0 14 * * *"]

# Rate limiting: 10 requests per hour per IP
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
[unsafe.bindings.simple]
limit = 10
period = 60

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1