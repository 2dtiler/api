name = "2dtiler-api"
main = "src/index.ts"
compatibility_date = "2026-04-09"

# Route all requests to api.2dtiler.com through this worker.
# The zone (2dtiler.com) must be on your Cloudflare account.
route = { pattern = "api.2dtiler.com/*", zone_name = "2dtiler.com" }

[triggers]
# Run daily at 14:00 UTC
crons = ["0 14 * * *"]

[[kv_namespaces]]
binding = "LOSPEC_PALETTES"
id = "88adee5ffcfc4b36a3743f95fc18bc67"

# Rate limiting: 10 requests per hour per IP
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
[unsafe.bindings.simple]
limit = 10
period = 3600

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1